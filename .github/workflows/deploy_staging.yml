name: Deploy to Staging

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
  CONTAINER_NAME: ${{ github.event.repository.name }}-staging

jobs:
  build-and-push:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image for Staging
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest

      - name: Wait for Docker Hub propagation
        run: sleep 10

      - name: Verify Docker Image Push
        run: |
          echo "Verifying image tag exists on Docker Hub..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "${{ secrets.DOCKERHUB_USERNAME }}:${{ secrets.DOCKERHUB_TOKEN }}" \
            "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/latest/")

          if [ "$STATUS" -ne 200 ]; then
            echo "❌ Docker image not found. Status code: $STATUS"
            exit 1
          else
            echo "✅ Docker image successfully pushed and verified."
          fi

      - name: Pull Docker Image
        run: docker pull ${{ env.IMAGE_NAME }}:latest

      - name: Stop and Remove Old Container
        run: |
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true

      - name: Run Container
        run: |
          docker run -d \
            -p ${{ vars.STAGING_PORT }}:3000 \
            --name ${{ env.CONTAINER_NAME }} \
            --env-file /opt/${{ github.event.repository.name }}/.env \
            --restart unless-stopped \
            ${{ env.IMAGE_NAME }}:latest
